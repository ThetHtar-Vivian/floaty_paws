  <body class="cat-select-page">
    <div class="cat-selection-wrapper">
      <nav class="navbar">
        <div class="navbar-container">
          <a href="index.html" class="navbar-logo">
            <img src="assets/images/paws.png" alt="Floaty Paws logo" />

      <h1 class="title">Choose Your Character</h1>
      <p class="select-text">Please choose the kitty that you wish to play the game with.</p>
      <div class="cat-layout">
        <div class="cat-preview">
          <img
            id="bigCat"
            src="assets/images/cats/cat-default.png"
            alt="Selected Cat"
          />
        </div>

        <div class="cat-scroll-container">
          <div class="cat-scroll">
            <div class="cat-thumb">
              <img
                src="assets/images/pixel-cat.png"
                onclick="selectCat(this)"
              />
            </div>
            <div class="cat-thumb">
              <img
                src="assets/images/pixel-cat2.png"
                onclick="selectCat(this)"
              />
            </div>            
            <div class="cat-thumb">
              <img
                src="assets/images/pixel-cat3.png"
                onclick="selectCat(this)"
              />
            </div>
            <div class="cat-thumb">
              <img
                src="assets/images/pixel-cat4.png"
                onclick="selectCat(this)"
              />
            </div>
            <div class="cat-thumb">
              <img
                src="assets/images/pixel-cat5.png"
                onclick="selectCat(this)"
              />
            </div>
            <div class="cat-thumb">

              <img

              />
            </div>
            <div class="cat-thumb">
              <img

            </div>
            <div class="cat-thumb">
              <img
